# ============================================================================
# DOCKER COMPOSE - LOCAL DEVELOPMENT MODE
# ============================================================================
# Este archivo es para desarrollo local con MongoDB y Redis locales.
#
# DIFERENCIAS CON docker-compose.yml (AWS):
# - Incluye MongoDB local (mongo:6.0)
# - Incluye Redis local (redis:7-alpine)
# - Usa MONGODB_URI (igual que AWS) construido con variables locales
# - Tiene healthchecks para dependencias
#
# USO:
#   docker-compose -f docker-compose.local.yml up --build
#
# MONGODB URI para local:
#   mongodb://admin:password@localhost:27017/franchises?authSource=admin
# ============================================================================

services:
  # ============================================================================
  # MONGODB - Local Development Database
  # ============================================================================
  mongo:
    image: mongo:6.0
    container_name: franchises-mongo-local
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${DB_NAME:-franchises}
    ports:
      - "${DB_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - franchises-network

  # ============================================================================
  # REDIS - Local Cache (Optional but recommended for local dev)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: franchises-redis-local
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - franchises-network

  # ============================================================================
  # API APPLICATION - Local Development
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: franchises-api-local
    env_file: .env
    environment:
      # ------------------------------------------------------------------------
      # SPRING PROFILE - DEVELOPMENT (Local)
      # ------------------------------------------------------------------------
      # Usa: application-dev.yml (MongoDB local, logs DEBUG, fallback habilitado)
      SPRING_PROFILES_ACTIVE: dev

      # ------------------------------------------------------------------------
      # MONGODB - URI completa (recomendado, igual formato que AWS)
      # ------------------------------------------------------------------------
      # Construye automáticamente la URI para MongoDB Docker local
      MONGODB_URI: ${MONGODB_URI:-mongodb://${DB_USER:-admin}:${DB_PASSWORD:-password}@mongo:27017/${DB_NAME:-franchises}?authSource=admin}

      # ------------------------------------------------------------------------
      # REDIS - Habilitado en desarrollo local
      # ------------------------------------------------------------------------
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # ------------------------------------------------------------------------
      # SECURITY (Fallbacks aceptados en desarrollo)
      # ------------------------------------------------------------------------
      # ⚠️ ADVERTENCIA: Configura JWT_SECRET en archivo .env
      # Generar con: openssl rand -base64 32
      # Si no está set, usa fallback de desarrollo (NO usar en prod)
      JWT_SECRET: ${JWT_SECRET}
      # JWT_EXPIRATION y JWT_REFRESH_EXPIRATION: fijos en application-dev.yml

      # ------------------------------------------------------------------------
      # SERVER & FEATURES (con fallbacks documentados)
      # ------------------------------------------------------------------------
      # SERVER_PORT: 8080 por defecto
      # ENABLE_CACHE: true por defecto (con Redis local)
      # ENABLE_METRICS: true por defecto
      # LOG_LEVEL: DEBUG para desarrollo

    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - franchises-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

    # Development volume mounting (opcional, para hot-reload)
    # volumes:
    #   - ./target:/app/target  # Solo si usas spring-boot-devtools

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================
volumes:
  mongo_data:
  redis_data:

networks:
  franchises-network:
    driver: bridge
